<!DOCTYPE html>
<html lang=pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>desafio 1</title>
    <style>
        th{
            border: 1px solid black;
            text-align: left;
            padding: 3px;
            
        }
        td{
            border: 1px solid black;
            text-align: left;
            padding: 3px;
            
        }
        table{
            text-align: center;
            width: 500px;
            border-collapse:collapse;
        }
        .cima{
            text-align: center;
        }
        thead{
            background-color: rgba(0, 0, 0, 0.767);
            color: aliceblue;
        }
        thead:hover{
            background-color: black;
            transition-duration: 0.8s;
        }
    </style>
</head>
<body>
    <table>
        <caption>exercicio de tabelas</caption>
        <thead>
            <tr>
                <th class="cima" scope="col">grupo</th>
                <th class="cima" scope="col">nomes</th>
                <th colspan="3" class="cima" scope="colgroup">filmes</th>
            </tr>
        </thead>
        <tbody>
            <tr>
                <th rowspan="3" class="cima" scope="rowgroup">mulheres</th>
                <td>ana maria santos</td>
                <td>alien</td>
                <td>rambo</td>
                <td>vingadores</td>
            </tr>
            <tr>
                <td>beatriz souza</td>
                <td>hulk</td>
                <td>inception</td>
                <td>batman</td>
            </tr>
            <tr>
                <td>cláudia melo</td>
                <td>oblivion</td>
                <td>matrix</td>
                <td>big hero</td>
            </tr>
            <tr>
                <th rowspan="3" class="cima" scope="rowgroup">homens</th>
                <td>bruno mendonça</td>
                <td>intocáveis</td>
                <td>amnésia</td>
                <td>gladiador</td>
            </tr>
            <tr>
                <td>daniel lourenço</td>
                <td>wall-e</td>
                <td>oldboy</td>
                <td>dangal</td>
            </tr>
            <tr>
                <td>fabiano mota</td>
                <td>star wars 5</td>
                <td>taxi driver</td>
                <td>toy story</td>
            </tr>
        </tbody>
    </table>
</body>
</html>
